<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assignment</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --maroon:      #7a1d1d;
      --dark-orange: #c2410c;
      --dirty-white: #f5f0e6;
      --black:       #111;
      --gray:        #555;
      --light-gray:  #ddd;
      --green:      #2e7d32;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--dirty-white);
      color: var(--black);
      min-height: 100vh;
    }

    .topbar {
      background: var(--maroon);
      color: white;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }

    .logo       { font-weight: bold; font-size: 1.5rem; }
    .panel-name { font-size: 1.35rem; letter-spacing: 1.2px; }
    .right      { display: flex; align-items: center; gap: 1.8rem; }
    .bell       { font-size: 1.4rem; cursor: pointer; }
    .profile    { font-size: 1.15rem; }
    .hamburger  { font-size: 1.7rem; cursor: pointer; display: none; color: white; }

    .sidebar {
      width: 240px;
      background: var(--dark-orange);
      color: white;
      height: calc(100vh - 64px);
      position: fixed;
      top: 64px;
      left: 0;
      overflow-y: auto;
      transition: transform 0.3s ease;
    }

    .sidebar ul {
      list-style: none;
      padding: 1.2rem 0;
    }

    .sidebar li {
      padding: 1rem 1.6rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .sidebar li:hover,
    .sidebar li.active {
      background: rgba(0,0,0,0.25);
    }

    .sidebar i {
      margin-right: 12px;
      width: 22px;
      text-align: center;
    }

    .main {
      margin-left: 240px;
      margin-top: 64px;
      padding: 2rem;
      min-height: calc(100vh - 64px);
    }

    h1 {
      color: var(--maroon);
      margin-bottom: 2rem;
      font-size: 2rem;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 1.1rem 1.3rem;
      text-align: left;
      border-bottom: 1px solid var(--light-gray);
    }

    th {
      background: var(--maroon);
      color: white;
      font-weight: 600;
    }

    tr:hover {
      background: #fbf8f4;
    }

    tr:selected {
      background: #fff3e0;
    }

    .status {
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      font-weight: 500;
      display: inline-block;
      min-width: 90px;
      text-align: center;
      color: white;
      justify-content: center;
      margin-top: auto;
    }

    .status-pending   { background: var(--maroon); }
    .status-assigned  { background: var(--dark-orange); }
    .status-completed { background: var(--green); }

    .action-cell select {
      padding: 0.5rem;
      border-radius: 6px;
      border: 1px solid var(--light-gray);
      background: white;
      font-size: 0.95rem;
      cursor: pointer;
    }

    @media (max-width: 992px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main {
        margin-left: 0;
      }
      .hamburger {
        display: block !important;
      }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="logo">HandyFix</div>
  <div class="panel-name">ADMIN PANEL</div>
  <div class="right">
    <i class="fas fa-bell bell"></i>
    <span class="profile">Admin Name</span>
    <i class="fas fa-bars hamburger" id="menuBtn"></i>
  </div>
</header>

<nav class="sidebar" id="sidebar">
  <ul>
    <li class="active" data-page="/admin/">
      <i class="fas fa-tachometer-alt"></i> Dashboard
    </li>
    <li data-page="/admin/service">
      <i class="fas fa-list-ul"></i> Requests
    </li>
    <li data-page="/admin/contractor">
      <i class="fas fa-hard-hat"></i> Contractors
    </li>
    <li data-page="/admin/customers">
      <i class="fas fa-users"></i> Customers
    </li>
    <li data-page="/admin/assignment">
      <i class="fas fa-link"></i> Assignments
    </li>
    <li data-page="/admin/messages">
      <i class="fas fa-comment-dots"></i> Messages
    </li>
    <li data-page="/admin/reports">
      <i class="fas fa-chart-bar"></i> Reports
    </li>
    <li data-page="/admin/settings">
      <i class="fas fa-cog"></i> Settings
    </li>
    <li data-page="Login.html">
      <i class="fas fa-sign-out-alt"></i> Logout</li>
  </ul>
</nav>

<main class="main">
  <h1>Assignment</h1>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Job ID</th>
          <th>Customer</th>
          <th>Contractor</th>
          <th>Service</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="assignmentTableBody">
        <!-- Table rows will be populated by JavaScript -->
      </tbody>
    </table>
  </div>
</main>

<script>
  // Data array of assignment objects


  // Function to populate the table
  async function populateTable() {

    assignments = await fetch('/api/fetchAssignments')
      .then(response => response.json())
      .catch(error => {
        console.error('Error fetching assignments:', error);
        return [];
      });
    const tbody = document.getElementById('assignmentTableBody');
    tbody.innerHTML = ''; // Clear existing rows

    assignments.forEach(assignment => {
      const row = document.createElement('tr');

      const statusClass = `status-${assignment.ticket_state}`;
      const statusText = assignment.ticket_state.charAt(0).toUpperCase() + assignment.ticket_state.slice(1);
      //a.*, u1.first_name AS customer_first_name, u1.last_name AS customer_last_name, u2.first_name AS contractor_first_name, u2.last_name AS contractor_last_name
      row.innerHTML = `
        <td>${assignment.jobId}</td>
        <td>${assignment.customer_first_name} ${assignment.customer_last_name}</td>
        <td>${assignment.contractor_first_name} ${assignment.contractor_last_name}</td>
        <td>${assignment.service_name}</td>
        <td class="status ${statusClass}">${statusText}</td>
        <td class="action-cell">
          <select onchange="updateStatus(this)">
            <option value="pending" ${assignment.ticket_state === 'pending' ? 'selected' : ''}>Pending</option>
            <option value="assigned" ${assignment.ticket_state === 'assigned' ? 'selected' : ''}>Assigned</option>
            <option value="completed" ${assignment.ticket_state === 'completed' ? 'selected' : ''}>Completed</option>
          </select>
        </td>
      `;

      tbody.appendChild(row);
    });
  }

  // Call populateTable on page load
  document.addEventListener('DOMContentLoaded', () => {
    populateTable();

    // Existing sidebar logic
    const currentFile = window.location.pathname.split('/').pop() || 'Assignment.html';
    document.querySelectorAll('.sidebar li').forEach(li => {
      const page = li.getAttribute('data-page');
      if (page === currentFile) {
        li.classList.add('active');
      } else {
        li.classList.remove('active');
      }
    });
  });

  // Hamburger menu toggle
  document.getElementById('menuBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
  });

  // Sidebar navigation
  document.querySelectorAll('.sidebar li').forEach(item => {
    item.addEventListener('click', function() {
      const page = this.getAttribute('data-page');
      if (page) {
        window.location.href = page;
      }
    });
  });

  // Update status function (modified to update the assignments array if needed)
  function updateStatus(select) {
    const row = select.closest('tr');
    const statusCell = row.querySelector('.status');
    const newStatus = select.value;

    if (!statusCell) return;

    statusCell.classList.remove('status-pending', 'status-assigned', 'status-completed');

    let statusText = '';
    if (newStatus === 'pending') {
      statusCell.classList.add('status-pending');
      statusText = 'Pending';
    } else if (newStatus === 'assigned') {
      statusCell.classList.add('status-assigned');
      statusText = 'Assigned';
    } else if (newStatus === 'completed') {
      statusCell.classList.add('status-completed');
      statusText = 'Completed';
    }

    statusCell.textContent = statusText;

    // Optionally update the assignments array (find by jobId)
    const jobId = parseInt(row.cells[0].textContent);
    const assignment = assignments.find(a => a.jobId === jobId);
    if (assignment) {
      assignment.status = newStatus;
    }
  }
</script>

</body>
</html>

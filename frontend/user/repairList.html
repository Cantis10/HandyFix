<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>/REPAIRLIST</h1><h1 id="dynamic"></h1>

      <script>

    const pathParts = window.location.pathname.split('/');
    const data = pathParts[pathParts.length - 1] || "No data";

    // Insert into <h1>
    document.getElementById('dynamic').textContent = data;
  </script>
</body>
</html>
